<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://sdpi-components.dev/releases/v3/sdpi-components.css" />
  <script src="https://sdpi-components.dev/releases/v3/sdpi-components.js"></script>
</head>
<body>
  <sdpi-item label="Overlay">
    <select id="overlaySelect" class="sdpi-item-value">
      <option value="">Select overlay...</option>
      <option value="racing-relative">Relative</option>
      <option value="racing-leaderboard">Leaderboard</option>
      <option value="racing-weather">Weather</option>
    </select>
  </sdpi-item>
  <sdpi-item label="Setting">
    <select id="settingSelect" class="sdpi-item-value">
      <option value="" disabled selected>Select overlay first...</option>
    </select>
  </sdpi-item>

  <script>
    const SETTINGS = {
      'racing-relative': [
        { value: 'showWeatherHeader', label: 'Weather Header' },
        { value: 'showHeader', label: 'Column Headers' },
        { value: 'showFooter', label: 'Session Footer' },
        { value: 'highlightIncidents', label: 'Highlight Incidents' },
        { value: 'showDriverTags', label: 'Show Driver Tags' },
        { value: 'hideCarsInPits', label: 'Hide in Pits' },
        { value: 'hideInGarage', label: 'Hide in Garage' },
        { value: 'hideOnTrack', label: 'Hide on Track' },
      ],
      'racing-leaderboard': [
        { value: 'showHeader', label: 'Session Header' },
        { value: 'highlightIncidents', label: 'Highlight Incidents' },
        { value: 'showDriverTags', label: 'Show Driver Tags' },
        { value: 'hideInGarage', label: 'Hide in Garage' },
        { value: 'hideOnTrack', label: 'Hide on Track' },
      ],
      'racing-weather': [
        { value: 'hideInGarage', label: 'Hide in Garage' },
        { value: 'hideOnTrack', label: 'Hide on Track' },
      ],
    };

    const overlaySelect = document.getElementById('overlaySelect');
    const settingSelect = document.getElementById('settingSelect');
    let currentSettings = {};

    SDPIComponents.streamDeckClient.didReceiveSettings.subscribe((settings) => {
      currentSettings = settings;
      if (settings.overlayType) overlaySelect.value = settings.overlayType;
      populateSettings(settings.overlayType, settings.setting);
    });

    overlaySelect.addEventListener('change', () => {
      populateSettings(overlaySelect.value, '');
      saveSettings();
    });

    settingSelect.addEventListener('change', saveSettings);

    function populateSettings(overlayType, currentSetting) {
      settingSelect.innerHTML = '';
      const items = SETTINGS[overlayType] || [];
      if (items.length === 0) {
        const opt = document.createElement('option');
        opt.value = '';
        opt.disabled = true;
        opt.selected = true;
        opt.textContent = 'Select overlay first...';
        settingSelect.appendChild(opt);
        return;
      }
      items.forEach((item) => {
        const opt = document.createElement('option');
        opt.value = item.value;
        opt.textContent = item.label;
        if (item.value === currentSetting) opt.selected = true;
        settingSelect.appendChild(opt);
      });
    }

    function saveSettings() {
      SDPIComponents.streamDeckClient.setSettings({
        overlayType: overlaySelect.value,
        setting: settingSelect.value,
      });
    }
  </script>
</body>
</html>
