<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://sdpi-components.dev/releases/v3/sdpi-components.css" />
  <script src="https://sdpi-components.dev/releases/v3/sdpi-components.js"></script>
</head>
<body>
  <sdpi-item label="Overlay">
    <sdpi-select setting="overlayType" placeholder="Select overlay...">
      <option value="racing-relative">Relative</option>
      <option value="racing-leaderboard">Leaderboard</option>
      <option value="racing-fuel">Fuel</option>
      <option value="racing-weather">Weather</option>
      <option value="racing-trackmap">Track Map</option>
      <option value="racing-flat-trackmap">Flat Track Map</option>
      <option value="racing-minimap">Mini Map</option>
      <option value="racing-radar">Radar</option>
      <option value="racing-input">Input</option>
      <option value="racing-telemetry">Telemetry</option>
      <option value="racing-battle-box">Battle Box</option>
      <option value="racing-spotter">Spotter</option>
      <option value="racing-incidents">Incidents</option>
      <option value="racing-overtake-alert">Overtake Alert</option>
      <option value="racing-pit-speed">Pit Speed</option>
      <option value="racing-data-frames">Data Frames</option>
      <option value="racing-twitch-chat">Twitch Chat</option>
      <option value="racing-turn-indicator">Turn Indicator</option>
      <option value="flags">Flags</option>
      <option value="incident-bar">Incident Bar</option>
    </sdpi-select>
  </sdpi-item>
</body>
</html>
